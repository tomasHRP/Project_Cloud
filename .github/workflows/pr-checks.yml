name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan

      - name: Build api-gateway image
        run: docker build -t api-gateway:test services/api-gateway

      - name: Build order-service image
        run: docker build -t order-service:test services/order-service

      - name: Build worker-service image
        run: docker build -t worker-service:test services/worker-service