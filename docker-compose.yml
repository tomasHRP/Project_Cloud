services:
  postgres:
    image: postgres:16-alpine
    container_name: tomber-postgres
    environment:
      POSTGRES_DB: cloudapp
      POSTGRES_USER: cloudadmin
      POSTGRES_PASSWORD: cloudpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudadmin -d cloudapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build:
      context: ./services/order-service
    container_name: tomber-order-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cloudapp
      DB_USER: cloudadmin
      DB_PASSWORD: cloudpassword
      AWS_REGION: us-east-1
      LOCAL_MODE: "true"
      SQS_QUEUE_URL: ""
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: tomber-api-gateway
    environment:
      ORDER_SERVICE_URL: http://order-service:5001
    ports:
      - "8080:5000"
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-service:
    build:
      context: ./services/worker-service
    container_name: tomber-worker-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cloudapp
      DB_USER: cloudadmin
      DB_PASSWORD: cloudpassword
      AWS_REGION: us-east-1
      LOCAL_MODE: "true"
      SQS_QUEUE_URL: ""
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data: